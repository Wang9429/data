# 发布 cnooc-risk-platform/ 静态演示站点。
name: Deploy CNOOC Risk Platform Demo to GitHub Pages

on:
  push:
    branches:
      - master
      - cursor/cnooc-risk-platform-demo-1bfe
      - cursor/regulatory-offline-demo-pack-43c2
      - cursor/regulatory-demo-final-fix-43c2
      - cursor/regulatory-demo-restore-original-43c2
      - cursor/regulatory-system-name-nav-fix-43c2
    paths:
      - 'cnooc-risk-platform/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload static demo
        uses: actions/upload-pages-artifact@v3
        with:
          path: cnooc-risk-platform

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
